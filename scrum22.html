<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AGL – Thư Viện Kỷ Niệm</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Quicksand:wght@400;500;600;700&family=Nunito:wght@400;600;700&display=swap');
        *{margin:0;padding:0;box-sizing:border-box;font-family:'Nunito',sans-serif;}
        body{background:linear-gradient(135deg,#ff9a9e,#fad0c4);min-height:100vh;}

        .header{position:fixed;top:0;left:0;right:0;z-index:100;display:flex;align-items:center;gap:12px;padding:12px 20px;background:rgba(255,106,136,.95);backdrop-filter:blur(8px);box-shadow:0 2px 12px rgba(255,106,136,.3);}
        .back-btn{background:rgba(255,255,255,.25);border:none;color:#fff;font-size:20px;cursor:pointer;border-radius:10px;padding:6px 12px;transition:.2s;}
        .back-btn:hover{background:rgba(255,255,255,.4);}
        .header-title{color:#fff;font-family:'Quicksand';font-weight:700;font-size:18px;}
        .header-right{margin-left:auto;display:flex;gap:8px;align-items:center;}
        .header-user{background:rgba(255,255,255,.2);color:#fff;font-size:12px;font-weight:700;padding:5px 12px;border-radius:20px;}
        .logout-btn{background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.3);color:#fff;font-size:12px;font-weight:700;padding:5px 12px;border-radius:20px;cursor:pointer;}
        .logout-btn:hover{background:rgba(255,255,255,.3);}

        .content{padding:85px 20px 40px;max-width:1100px;margin:0 auto;}
        .dashboard-wrapper{display:flex;gap:22px;align-items:flex-start;}
        .side-info{width:260px;flex-shrink:0;}
        .main-content{flex-grow:1;}
        @media(max-width:800px){.dashboard-wrapper{flex-direction:column;}.side-info{width:100%;}}

        .card{background:rgba(255,255,255,.97);border-radius:20px;padding:22px;margin-bottom:16px;box-shadow:0 8px 28px rgba(255,105,180,.15);}
        h2,h3{color:#c0395e;font-family:'Quicksand';margin-top:0;}
        h2{font-size:22px;margin-bottom:4px;}
        .subtitle{color:#e84393;font-size:13px;opacity:.8;margin-bottom:16px;}

        .stat-row{display:flex;justify-content:space-between;align-items:center;color:#c0395e;margin:10px 0;font-weight:700;font-size:14px;}
        .stat-num{background:#fff0f5;padding:4px 14px;border-radius:20px;font-size:16px;color:#e84393;}

        .upload-label{display:block;padding:18px;border:2px dashed #ffe0ea;border-radius:14px;text-align:center;cursor:pointer;background:#fff9fb;transition:.3s;color:#c0395e;font-weight:700;}
        .upload-label:hover{background:#ffe0ea;border-color:#ff6a88;}

        .filter-group{display:flex;gap:8px;flex-wrap:wrap;}
        .f-btn{padding:7px 16px;border-radius:20px;border:2px solid #ffe0ea;background:#fff;cursor:pointer;color:#c0395e;font-weight:700;font-size:13px;transition:.2s;}
        .f-btn.active,.f-btn:hover{background:#ff6a88;color:#fff;border-color:#ff6a88;}
        .gallery-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:20px;flex-wrap:wrap;gap:12px;}

        /* ── GRID ── */
        .media-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(175px,1fr));gap:16px;}

        /* FIX: cursor pointer + position relative để tránh z-index conflict */
        .media-item{border:2px solid #ffe0ea;border-radius:18px;overflow:hidden;background:#fff;transition:.3s;cursor:pointer;position:relative;}
        .media-item:hover{transform:translateY(-4px);border-color:#ff6a88;box-shadow:0 10px 25px rgba(255,106,136,.2);}

        .img-box{height:140px;background:#f5f5f5;overflow:hidden;position:relative;}
        .img-box img{width:100%;height:100%;object-fit:cover;transition:.3s;
          /* FIX: pointer-events none trên img để click bubble lên media-item */
          pointer-events:none;}
        .media-item:hover .img-box img{transform:scale(1.05);}

        .file-box{height:140px;display:flex;flex-direction:column;align-items:center;justify-content:center;background:#fff9fb;gap:6px;}
        .file-box .file-icon{font-size:44px;pointer-events:none;}
        .file-box .file-type{font-size:10px;font-weight:700;color:#aaa;text-transform:uppercase;pointer-events:none;}
        .item-name{padding:10px 12px;font-size:12px;font-weight:700;color:#444;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;border-top:1px solid #fce8f0;pointer-events:none;}
        .item-date{padding:0 12px 8px;font-size:11px;color:#bbb;pointer-events:none;}

        /* ── LIGHTBOX FIX ── */
        /* Dùng class thay vì display:none/flex để tránh specificity issue */
        .lightbox{
          position:fixed;inset:0;
          background:rgba(0,0,0,.85);
          z-index:9999;
          display:flex;           /* luôn flex */
          align-items:center;
          justify-content:center;
          padding:20px;
          opacity:0;
          pointer-events:none;    /* ẩn bằng opacity + pointer-events */
          transition:opacity .25s;
        }
        .lightbox.open{
          opacity:1;
          pointer-events:all;
        }
        .lightbox-inner{background:#fff;border-radius:20px;overflow:hidden;max-width:80vw;max-height:85vh;display:flex;flex-direction:column;}
        .lightbox-img{max-width:100%;max-height:70vh;object-fit:contain;display:block;}
        .lightbox-footer{padding:14px 18px;display:flex;justify-content:space-between;align-items:center;}
        .lightbox-name{font-weight:700;color:#333;font-size:14px;}
        .lightbox-close{background:#ff6a88;color:#fff;border:none;border-radius:10px;padding:7px 16px;cursor:pointer;font-weight:700;}
        /* Nav buttons */
        .lb-nav{position:absolute;top:50%;transform:translateY(-50%);background:rgba(255,255,255,.25);border:none;color:#fff;font-size:48px;line-height:1;cursor:pointer;border-radius:50%;width:56px;height:56px;display:flex;align-items:center;justify-content:center;transition:.2s;z-index:10000;}
        .lb-nav:hover{background:rgba(255,255,255,.45);}
        .lb-prev{left:12px;}
        .lb-next{right:12px;}
        .lb-nav:disabled{opacity:.2;cursor:default;}

        .access-denied{text-align:center;padding:60px 20px;}
        .access-denied .lock{font-size:56px;margin-bottom:14px;}
        .access-denied h3{color:#e84393;font-family:'Quicksand';margin-bottom:8px;}
        .access-denied p{color:#aaa;font-size:14px;}
        .access-denied a{color:#ff6a88;font-weight:700;text-decoration:none;}

        .empty-grid{text-align:center;padding:50px 20px;color:#bbb;}
        .empty-grid .icon{font-size:48px;margin-bottom:12px;}

        /* ── FILE MODAL ── */
        .file-modal{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:9998;display:flex;align-items:center;justify-content:center;padding:20px;opacity:0;pointer-events:none;transition:opacity .25s;}
        .file-modal.open{opacity:1;pointer-events:all;}
        .fm-box{background:#fff;border-radius:20px;overflow:hidden;width:min(780px,92vw);max-height:88vh;display:flex;flex-direction:column;box-shadow:0 20px 60px rgba(0,0,0,.4);}
        .fm-header{display:flex;align-items:center;gap:12px;padding:16px 20px;background:linear-gradient(135deg,#ff6a88,#ff8e53);color:#fff;}
        .fm-icon{font-size:28px;flex-shrink:0;}
        .fm-title{font-weight:700;font-size:15px;flex-grow:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-family:'Quicksand';}
        .fm-body{flex:1;overflow:hidden;display:flex;flex-direction:column;min-height:0;}
        .fm-preview{flex:1;border:none;min-height:0;}
        .fm-nopreview{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;padding:50px 20px;flex:1;}
        .fm-nopreview .np-icon{font-size:64px;}
        .fm-nopreview p{color:#999;font-size:14px;text-align:center;}
        .fm-footer{display:flex;gap:10px;justify-content:flex-end;padding:14px 20px;border-top:1px solid #fce8f0;flex-shrink:0;}
        .fm-btn{border:none;border-radius:10px;padding:9px 20px;cursor:pointer;font-weight:700;font-size:13px;transition:.2s;}
        .fm-btn-dl{background:#ff6a88;color:#fff;}
        .fm-btn-dl:hover{background:#e84393;}
        .fm-btn-close{background:#f0f0f0;color:#555;}
        .fm-btn-close:hover{background:#e0e0e0;}

        .flower{position:fixed;top:-50px;font-size:18px;animation:fall linear infinite;pointer-events:none;z-index:0;}
        @keyframes fall{0%{transform:translateY(-50px) rotate(0)}100%{transform:translateY(110vh) rotate(360deg)}}

        /* toast */
        #toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);padding:11px 22px;border-radius:12px;color:#fff;font-weight:700;font-size:14px;opacity:0;transition:.3s;z-index:99999;pointer-events:none;}
        #toast.show{opacity:1;}
    </style>
</head>
<body>

<!-- HEADER -->
<div class="header">
    <button class="back-btn" onclick="window.location.href='Giaodienquanlysukienclb.html'">←</button>
    <div class="header-title">🖼 Thư Viện Kỷ Niệm</div>
    <div class="header-right">
        <div class="header-user" id="headerUser">Đang tải...</div>
        <button class="logout-btn" id="logoutBtn" style="display:none;" onclick="doLogout()">Đăng xuất</button>
    </div>
</div>

<!-- LIGHTBOX -->
<div class="lightbox" id="lightbox">
    <button class="lb-nav lb-prev" id="lightboxPrev">&#8249;</button>
    <div class="lightbox-inner" id="lightboxInner">
        <img class="lightbox-img" id="lightboxImg" src="" alt="">
        <div class="lightbox-footer">
            <span class="lightbox-name" id="lightboxName"></span>
            <div style="display:flex;gap:8px;">
                <button class="lightbox-close" id="lightboxDownloadBtn">⬇ Tải về</button>
                <button class="lightbox-close" id="lightboxCloseBtn">✕ Đóng</button>
            </div>
        </div>
    </div>
    <button class="lb-nav lb-next" id="lightboxNext">&#8250;</button>
</div>

<!-- FILE MODAL -->
<div class="file-modal" id="fileModal">
    <div class="fm-box">
        <div class="fm-header">
            <div class="fm-icon" id="fmIcon">📄</div>
            <div class="fm-title" id="fmTitle">Tên file</div>
        </div>
        <div class="fm-body" id="fmBody">
            <!-- nội dung động -->
        </div>
        <div class="fm-footer">
            <button class="fm-btn fm-btn-dl" id="fmDownloadBtn">⬇ Tải về máy</button>
            <button class="fm-btn fm-btn-close" id="fmCloseBtn">✕ Đóng</button>
        </div>
    </div>
</div>

<!-- CONTENT -->
<div class="content">
    <div class="dashboard-wrapper">
        <aside class="side-info">
            <div class="card">
                <h3>📊 Thống kê</h3>
                <div class="stat-row"><span>🖼 Ảnh</span><span class="stat-num" id="imgCount">0</span></div>
                <div class="stat-row"><span>📄 File</span><span class="stat-num" id="fileCount">0</span></div>
                <div class="stat-row"><span>📁 Tổng</span><span class="stat-num" id="totalCount">0</span></div>
            </div>
            <div class="card" id="uploadCard" style="display:none;">
                <h3>📤 Tải lên</h3>
                <label class="upload-label">
                    ➕ Chọn ảnh / file
                    <input type="file" id="fileInput" hidden accept="image/*,.pdf,.doc,.docx,.pptx,.xlsx" multiple>
                </label>
                <p style="font-size:11px;color:#aaa;margin-top:8px;text-align:center;">Hỗ trợ: ảnh, PDF, Office</p>
            </div>
            <div class="card" id="userHint" style="display:none;">
                <h3>💡 Ghi chú</h3>
                <p style="font-size:13px;color:#888;">Bạn đang xem tư liệu CLB ở chế độ <b>chỉ xem</b>.<br>Liên hệ Admin để thêm tư liệu mới.</p>
            </div>
        </aside>

        <main class="main-content">
            <div class="card">
                <div class="gallery-header">
                    <div>
                        <h2>🌸 Thư Viện Kỷ Niệm</h2>
                        <p class="subtitle">Lưu giữ những khoảnh khắc tuyệt vời của CLB</p>
                    </div>
                    <div class="filter-group" id="filterGroup">
                        <button class="f-btn active" data-filter="all">Tất cả</button>
                        <button class="f-btn" data-filter="image">🖼 Ảnh</button>
                        <button class="f-btn" data-filter="file">📄 File</button>
                    </div>
                </div>
                <div id="mediaGrid" class="media-grid"></div>
            </div>
        </main>
    </div>
</div>

<div id="toast"></div>

<script>
// ══════════════════════════════════════════════════════════
//  AUTH
// ══════════════════════════════════════════════════════════
function getCurrentUser() {
    try { return JSON.parse(localStorage.getItem('currentUser') || 'null'); } catch { return null; }
}
function isAdmin()    { return getCurrentUser()?.role === 'admin'; }
function isLoggedIn() { return !!getCurrentUser(); }

function doLogout() {
    localStorage.removeItem('currentUser');
    window.location.href = 'Giaodienquanlysukienclb.html';
}

function initHeader() {
    const u = getCurrentUser();
    if (u) {
        document.getElementById('headerUser').textContent =
            (u.role === 'admin' ? '👑 Admin: ' : '👤 ') + (u.name || u.email);
        document.getElementById('logoutBtn').style.display = 'block';
        document.getElementById('uploadCard').style.display = isAdmin() ? 'block' : 'none';
        document.getElementById('userHint').style.display   = !isAdmin() ? 'block' : 'none';
    } else {
        document.getElementById('headerUser').textContent = 'Khách';
    }
}

// ══════════════════════════════════════════════════════════
//  DATA
// ══════════════════════════════════════════════════════════
let galleryData = JSON.parse(localStorage.getItem('galleryData_v2') || 'null') || [
    { id:1, type:'image', name:'Lễ khai mạc CLB',     url:'https://picsum.photos/600/400?random=1',  date:'2025-01-10' },
    { id:2, type:'image', name:'Team Building 2025',   url:'https://picsum.photos/600/400?random=2',  date:'2025-02-14' },
    { id:3, type:'image', name:'Workshop Kỹ năng',     url:'https://picsum.photos/600/400?random=3',  date:'2025-03-05' },
    { id:4, type:'file',  name:'Kế hoạch Q1 2025.pdf', url:'#',                                       date:'2025-01-01' },
    { id:5, type:'image', name:'Gala Cuối Năm',        url:'https://picsum.photos/600/400?random=5',  date:'2024-12-31' },
    { id:6, type:'image', name:'Tuyển thành viên',     url:'https://picsum.photos/600/400?random=6',  date:'2025-04-01' },
    { id:7, type:'file',  name:'Báo cáo hoạt động.docx', url:'#',                                    date:'2025-03-31' },
    { id:8, type:'image', name:'Sự kiện từ thiện',     url:'https://picsum.photos/600/400?random=8',  date:'2025-02-28' },
];

let currentFilter = 'all';

// ══════════════════════════════════════════════════════════
//  LIGHTBOX  — prev/next + download
// ══════════════════════════════════════════════════════════
const lightbox     = document.getElementById('lightbox');
const lightboxImg  = document.getElementById('lightboxImg');
const lightboxName = document.getElementById('lightboxName');

let currentImageList  = [];   // danh sách ảnh hiện đang hiển thị
let currentImageIndex = 0;

function getImageList() {
    const filtered = currentFilter === 'all' ? galleryData : galleryData.filter(i => i.type === currentFilter);
    return filtered.filter(i => i.type === 'image');
}

function openLightbox(url, name) {
    currentImageList  = getImageList();
    currentImageIndex = currentImageList.findIndex(i => i.url === url);
    if (currentImageIndex < 0) currentImageIndex = 0;
    showLightboxItem(currentImageIndex);
    lightbox.classList.add('open');
}

function showLightboxItem(idx) {
    const item = currentImageList[idx];
    if (!item) return;
    lightboxImg.src = '';
    lightboxImg.alt = item.name;
    lightboxName.textContent = item.name;
    lightboxImg.src = item.url;
    // update nav
    document.getElementById('lightboxPrev').disabled = idx === 0;
    document.getElementById('lightboxNext').disabled = idx === currentImageList.length - 1;
    // update download button
    document.getElementById('lightboxDownloadBtn').onclick = function() {
        downloadFile(item.url, item.name);
    };
}

function closeLightbox() {
    lightbox.classList.remove('open');
    setTimeout(() => { lightboxImg.src = ''; }, 300);
}

document.getElementById('lightboxPrev').addEventListener('click', function(e) {
    e.stopPropagation();
    if (currentImageIndex > 0) {
        currentImageIndex--;
        showLightboxItem(currentImageIndex);
    }
});

document.getElementById('lightboxNext').addEventListener('click', function(e) {
    e.stopPropagation();
    if (currentImageIndex < currentImageList.length - 1) {
        currentImageIndex++;
        showLightboxItem(currentImageIndex);
    }
});

lightbox.addEventListener('click', function(e) {
    if (e.target === lightbox) closeLightbox();
});
document.getElementById('lightboxCloseBtn').addEventListener('click', closeLightbox);

document.addEventListener('keydown', function(e) {
    if (!lightbox.classList.contains('open')) return;
    if (e.key === 'Escape')      closeLightbox();
    if (e.key === 'ArrowLeft')   { if (currentImageIndex > 0) { currentImageIndex--; showLightboxItem(currentImageIndex); } }
    if (e.key === 'ArrowRight')  { if (currentImageIndex < currentImageList.length - 1) { currentImageIndex++; showLightboxItem(currentImageIndex); } }
});
// ══════════════════════════════════════════════════════════
//  FILTER — event delegation thay vì inline onclick
// ══════════════════════════════════════════════════════════
document.getElementById('filterGroup').addEventListener('click', function(e) {
    const btn = e.target.closest('.f-btn');
    if (!btn) return;
    document.querySelectorAll('.f-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentFilter = btn.dataset.filter;
    renderGallery();
});

// ══════════════════════════════════════════════════════════
//  GALLERY CLICK — FIX: event delegation, KHÔNG dùng inline onclick
// ══════════════════════════════════════════════════════════
document.getElementById('mediaGrid').addEventListener('click', function(e) {
    const item = e.target.closest('.media-item');
    if (!item) return;

    const type = item.dataset.type;
    const url  = item.dataset.url;
    const name = item.dataset.name;

    if (type === 'image') {
        openLightbox(url, name);
    } else if (url && url !== '#') {
        openFileModal(url, name, item.dataset.ext || '');
    }
});

// ══════════════════════════════════════════════════════════
//  RENDER
// ══════════════════════════════════════════════════════════
function escAttr(s) {
    return (s || '').replace(/&/g, '&amp;').replace(/"/g, '&quot;').replace(/'/g, '&#39;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}

function renderGallery() {
    const grid = document.getElementById('mediaGrid');

    if (!isLoggedIn()) {
        grid.innerHTML = `
            <div class="access-denied" style="grid-column:1/-1;">
                <div class="lock">🔒</div>
                <h3>Nội dung bị giới hạn</h3>
                <p>Vui lòng <a href="Giaodienquanlysukienclb.html">đăng nhập</a> để xem thư viện CLB.</p>
            </div>`;
        document.getElementById('uploadCard').style.display = 'none';
        document.getElementById('userHint').style.display   = 'none';
        updateStats(0, 0);
        return;
    }

    const list = currentFilter === 'all'
        ? galleryData
        : galleryData.filter(i => i.type === currentFilter);

    if (!list.length) {
        grid.innerHTML = `<div class="empty-grid" style="grid-column:1/-1;"><div class="icon">📭</div><p>Chưa có tư liệu nào trong danh mục này.</p></div>`;
        return;
    }

    // FIX: dùng data-* attributes thay vì inline onclick
    grid.innerHTML = list.map(item => {
        const dateStr = item.date ? new Date(item.date + 'T00:00:00').toLocaleDateString('vi-VN') : '';
        const safeName = escAttr(item.name);
        const safeUrl  = escAttr(item.url);

        if (item.type === 'image') {
            return `
                <div class="media-item" data-type="image" data-url="${safeUrl}" data-name="${safeName}" title="Click để xem ảnh">
                    <div class="img-box">
                        <img src="${safeUrl}" loading="lazy" alt="${safeName}">
                    </div>
                    <div class="item-name">${item.name}</div>
                    <div class="item-date">${dateStr}</div>
                </div>`;
        } else {
            const ext  = (item.name.split('.').pop() || '').toLowerCase();
            const icon = ext === 'pdf' ? '📕' : ext === 'pptx' ? '📊' : ext === 'xlsx' ? '📗' : ext === 'docx' || ext === 'doc' ? '📝' : '📄';
            const hasData = safeUrl && safeUrl !== '#';
            return `
                <div class="media-item" data-type="file" data-url="${safeUrl}" data-name="${safeName}" data-ext="${ext}" title="${hasData ? 'Click để xem / tải file' : 'File chưa có dữ liệu'}">
                    <div class="file-box">
                        <div class="file-icon">${icon}</div>
                        <div class="file-type">${ext.toUpperCase()}</div>
                    </div>
                    <div class="item-name">${item.name}</div>
                    <div class="item-date" style="display:flex;justify-content:space-between;align-items:center;padding:0 12px 10px;">
                        <span>${dateStr}</span>
                        ${hasData ? `<span style="font-size:10px;color:#ff6a88;font-weight:700;">👁 Xem / ⬇</span>` : `<span style="font-size:10px;color:#ccc;">Chưa có file</span>`}
                    </div>
                </div>`;
        }
    }).join('');

    updateStats(
        galleryData.filter(i => i.type === 'image').length,
        galleryData.filter(i => i.type === 'file').length
    );
}

function updateStats(imgs, files) {
    document.getElementById('imgCount').textContent   = imgs;
    document.getElementById('fileCount').textContent  = files;
    document.getElementById('totalCount').textContent = imgs + files;
}

// ══════════════════════════════════════════════════════════
//  DOWNLOAD HELPER
// ══════════════════════════════════════════════════════════
function downloadFile(url, name) {
    if (!url || url === '#') { showToast('⚠️ File chưa có dữ liệu để tải!'); return; }
    const a = document.createElement('a');
    a.href = url;
    a.download = name;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
}

// ══════════════════════════════════════════════════════════
//  FILE MODAL — xem + tải
// ══════════════════════════════════════════════════════════
const fileModal = document.getElementById('fileModal');

function openFileModal(url, name, ext) {
    const iconMap = { pdf:'📕', pptx:'📊', xlsx:'📗', xls:'📗', doc:'📝', docx:'📝' };
    document.getElementById('fmIcon').textContent  = iconMap[ext] || '📄';
    document.getElementById('fmTitle').textContent = name;

    const body = document.getElementById('fmBody');

    if (ext === 'pdf') {
        // PDF → nhúng trực tiếp vào iframe
        body.innerHTML = `<iframe class="fm-preview" src="${url}" style="width:100%;height:60vh;border:none;"></iframe>`;
    } else if (['png','jpg','jpeg','gif','webp','svg'].includes(ext)) {
        body.innerHTML = `<img src="${url}" style="max-width:100%;max-height:60vh;object-fit:contain;display:block;margin:auto;padding:12px;">`;
    } else {
        // Các định dạng Office, v.v. — không xem được trực tiếp trong browser
        const labels = { docx:'Word', doc:'Word', pptx:'PowerPoint', xlsx:'Excel', xls:'Excel' };
        const label  = labels[ext] || ext.toUpperCase();
        body.innerHTML = `
            <div class="fm-nopreview">
                <div class="np-icon">${iconMap[ext] || '📄'}</div>
                <p>File <b>${label}</b> không thể xem trực tiếp trên trình duyệt.<br>
                   Vui lòng tải về máy rồi mở bằng ứng dụng tương ứng.</p>
            </div>`;
    }

    document.getElementById('fmDownloadBtn').onclick = () => downloadFile(url, name);
    fileModal.classList.add('open');
}

function closeFileModal() {
    fileModal.classList.remove('open');
    setTimeout(() => { document.getElementById('fmBody').innerHTML = ''; }, 300);
}

document.getElementById('fmCloseBtn').addEventListener('click', closeFileModal);
fileModal.addEventListener('click', e => { if (e.target === fileModal) closeFileModal(); });
document.addEventListener('keydown', e => {
    if (e.key === 'Escape') { closeFileModal(); closeLightbox(); }
});

// ══════════════════════════════════════════════════════════
//  UPLOAD — lưu CẢ file thường thành dataURL để tải được
// ══════════════════════════════════════════════════════════
document.getElementById('fileInput').addEventListener('change', function() {
    if (!isAdmin()) {
        showToast('⚠️ Chỉ Admin mới được tải lên tư liệu!');
        this.value = '';
        return;
    }

    const files = Array.from(this.files || []);
    if (!files.length) return;

    let processed = 0;
    files.forEach(f => {
        const isImg = f.type.startsWith('image/');
        const today = new Date().toISOString().substring(0, 10);

        if (isImg) {
            // FIX: dùng FileReader → dataURL thay vì blob URL
            // → URL vẫn hợp lệ sau khi reload trang
            const reader = new FileReader();
            reader.onload = function(ev) {
                galleryData.unshift({
                    id   : Date.now() + Math.random(),
                    type : 'image',
                    name : f.name,
                    url  : ev.target.result, // dataURL
                    date : today
                });
                processed++;
                trySave(processed, files.length);
            };
            reader.readAsDataURL(f);
        } else {
            // FIX: đọc file thành dataURL để có thể tải về sau
            const reader = new FileReader();
            reader.onload = function(ev) {
                galleryData.unshift({
                    id   : Date.now() + Math.random(),
                    type : 'file',
                    name : f.name,
                    url  : ev.target.result,   // dataURL → tải được
                    date : today
                });
                processed++;
                trySave(processed, files.length);
            };
            reader.readAsDataURL(f);
        }
    });

    this.value = ''; // reset input
});

function trySave(done, total) {
    if (done < total) return;
    try {
        localStorage.setItem('galleryData_v2', JSON.stringify(galleryData));
    } catch (e) {
        // localStorage có thể full nếu nhiều ảnh lớn
        showToast('⚠️ Không thể lưu một số ảnh (dung lượng localStorage đầy)');
    }
    renderGallery();
    showToast('✅ Tải lên thành công!');
}

// ══════════════════════════════════════════════════════════
//  TOAST
// ══════════════════════════════════════════════════════════
function showToast(msg, color) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.style.background = color || '#ff6a88';
    t.classList.add('show');
    clearTimeout(t._t);
    t._t = setTimeout(() => t.classList.remove('show'), 2800);
}

// ══════════════════════════════════════════════════════════
//  FLOWER
// ══════════════════════════════════════════════════════════
setInterval(() => {
    const f = document.createElement('div');
    f.className = 'flower'; f.innerHTML = '🌸';
    f.style.left = Math.random() * 100 + 'vw';
    f.style.animationDuration = (3 + Math.random() * 5) + 's';
    document.body.appendChild(f);
    setTimeout(() => f.remove(), 8000);
}, 500);

// ══════════════════════════════════════════════════════════
//  INIT
// ══════════════════════════════════════════════════════════
initHeader();
renderGallery();
</script>
