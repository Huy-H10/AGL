<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Đăng ký Admin CLB</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #ff9a9e, #fecfef);
}

/* hiệu ứng hoa */
.flower {
    position: fixed;
    top: -50px;
    font-size: 20px;
    animation: fall linear infinite;
}
@keyframes fall {
    to { transform: translateY(110vh); }
}

/* căn giữa */
.container {
    display: flex;
    justify-content: center;
    padding: 60px;
}

/* form */
.form-box {
    width: 350px;
    background: rgba(255,255,255,0.9);
    padding: 20px;
    border-radius: 15px;
    box-shadow: 0 10px 25px rgba(255,105,180,0.4);
}

h2 {
    text-align: center;
    color: #ff4d88;
}

input, button {
    width: 100%;
    box-sizing: border-box;
    padding: 10px;
    margin: 8px 0;
    border-radius: 8px;
    border: 1px solid #ffb6c1;
}

button {
    background: #ff4d88;
    color: white;
    border: none;
    cursor: pointer;
}

button:hover {
    background: #e6005c;
}

#thongbao {
    text-align: center;
    font-weight: bold;
    margin-top: 10px;
}
</style>
</head>

<body>

<script>
for (let i = 0; i < 30; i++) {
    let f = document.createElement("div");
    f.className = "flower";
    f.innerHTML = "🌸";
    f.style.left = Math.random()*100 + "vw";
    f.style.animationDuration = (5 + Math.random()*5) + "s";
    document.body.appendChild(f);
}
</script>

<div class="container">

<div class="form-box">
    <h2>🔐 Đăng ký Admin</h2>

    <input type="text" id="hoten" placeholder="Họ tên">
    <input type="email" id="email" placeholder="Email công việc">
    <input type="password" id="password" placeholder="Mật khẩu">
    <input type="text" id="chucvu" placeholder="Chức vụ trong CLB">

    <button onclick="dangKyAdmin()">Đăng ký</button>

    <p id="thongbao"></p>
</div>

</div>

<script>
let danhSachAdmin = JSON.parse(localStorage.getItem("admin")) || [];

function dangKyAdmin() {
    let hoten = document.getElementById("hoten").value.trim();
    let email = document.getElementById("email").value.trim();
    let password = document.getElementById("password").value.trim();
    let chucvu = document.getElementById("chucvu").value.trim();
    let thongbao = document.getElementById("thongbao");

    thongbao.innerText = "";

    if (!hoten || !email || !password || !chucvu) {
        thongbao.style.color = "red";
        thongbao.innerText = "❌ Vui lòng nhập đầy đủ thông tin!";
        return;
    }

    // email công việc
    if (!(email.endsWith("@gmail.com") || email.endsWith("@student.hcmue.edu.vn"))) {
        thongbao.style.color = "red";
        thongbao.innerText = "❌ Email phải là email công việc!";
        return;
    }

    // mật khẩu mạnh
    if (
        password.length < 6 ||
        !/[a-zA-Z]/.test(password) ||
        !/[0-9]/.test(password) ||
        !/^[A-Z]/.test(password) ||
        !/[!@#$%^&*(),.?":{}|<>]/.test(password)
    ) {
        thongbao.style.color = "red";
        thongbao.innerText = "❌ Mật khẩu ≥6 ký tự, có chữ, số, ký tự đặc biệt và viết hoa chữ đầu!";
        return;
    }

    // trùng email
    if (danhSachAdmin.some(ad => ad.email === email)) {
        thongbao.style.color = "red";
        thongbao.innerText = "❌ Email đã tồn tại!";
        return;
    }

    let admin = { hoten, email, password, chucvu };
    danhSachAdmin.push(admin);

    localStorage.setItem("admin", JSON.stringify(danhSachAdmin));

    thongbao.style.color = "green";
    thongbao.innerText = "🎉 Đăng ký admin thành công!";

    document.getElementById("hoten").value = "";
    document.getElementById("email").value = "";
    document.getElementById("password").value = "";
    document.getElementById("chucvu").value = "";
}
</script>

</body>
</html>
