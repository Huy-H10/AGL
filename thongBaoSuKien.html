<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Thông báo sự kiện - CLB</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Quicksand:wght@400;500;600;700&family=Nunito:wght@400;600;700&display=swap');
    *{margin:0;padding:0;box-sizing:border-box;font-family:'Nunito',sans-serif;}
    body{background:linear-gradient(135deg,#ff9a9e,#fad0c4);min-height:100vh;}
    .header{position:fixed;top:0;left:0;right:0;z-index:100;display:flex;align-items:center;gap:12px;padding:12px 20px;background:rgba(255,106,136,.95);backdrop-filter:blur(8px);box-shadow:0 2px 12px rgba(255,106,136,.3);}
    .back-btn{background:rgba(255,255,255,.25);border:none;color:#fff;font-size:20px;cursor:pointer;border-radius:10px;padding:6px 12px;transition:.2s;}
    .back-btn:hover{background:rgba(255,255,255,.4);}
    .header-title{color:#fff;font-family:'Quicksand',sans-serif;font-weight:700;font-size:18px;}
    .tabs{display:flex;margin-left:auto;gap:6px;}
    .tab-btn{background:rgba(255,255,255,.2);border:none;color:#fff;font-size:13px;font-weight:700;padding:7px 14px;border-radius:10px;cursor:pointer;transition:.2s;}
    .tab-btn.active,.tab-btn:hover{background:rgba(255,255,255,.9);color:#e84393;}
    .content{padding:90px 20px 40px;max-width:700px;margin:0 auto;}
    .section{display:none;} .section.active{display:block;}
    .card{background:rgba(255,255,255,.97);border-radius:20px;padding:24px;margin-bottom:16px;box-shadow:0 8px 28px rgba(255,105,180,.15);animation:slideIn .3s ease;}
    @keyframes slideIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
    .card h3{color:#e84393;font-family:'Quicksand',sans-serif;font-size:16px;margin-bottom:16px;}
    .form-group{margin-bottom:14px;}
    .form-group label{display:block;font-size:12px;font-weight:700;color:#c0395e;margin-bottom:5px;}
    .form-group input,.form-group textarea,.form-group select{width:100%;padding:11px 14px;border:2px solid #ffe0ea;border-radius:12px;background:#fff9fb;outline:none;font-size:14px;transition:.2s;font-family:'Nunito',sans-serif;}
    .form-group textarea{resize:vertical;min-height:100px;}
    .recipient-info{background:#fff0f5;border:1.5px solid #ffe0ea;border-radius:12px;padding:12px 16px;margin-bottom:14px;font-size:13px;color:#c0395e;}
    .recipient-info b{color:#e84393;font-size:18px;}
    .toggle-email{display:flex;align-items:center;gap:10px;padding:12px 16px;background:#fff0f5;border:1.5px solid #ffe0ea;border-radius:12px;margin-bottom:14px;cursor:pointer;}
    .toggle-email input[type="checkbox"]{width:18px;height:18px;accent-color:#e84393;cursor:pointer;}
    .toggle-email span{font-size:13px;font-weight:700;color:#c0395e;}
    .toggle-email .sub{font-size:11px;font-weight:400;color:#aaa;display:block;}
    .btn-send{width:100%;padding:14px;background:linear-gradient(135deg,#ff6a88,#e84393);color:#fff;border:none;border-radius:14px;font-weight:700;font-size:15px;cursor:pointer;transition:.3s;}
    .btn-send:hover{transform:translateY(-2px);box-shadow:0 5px 15px rgba(255,106,136,.4);}
    .btn-send:disabled{opacity:.6;cursor:not-allowed;transform:none;}
    .top-actions{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;}
    .section-label{color:#fff;font-family:'Quicksand';font-weight:700;font-size:15px;text-shadow:0 2px 6px rgba(0,0,0,.1);}
    .btn-mark-all{background:rgba(255,255,255,.3);border:none;color:#fff;font-size:12px;font-weight:700;padding:6px 14px;border-radius:8px;cursor:pointer;transition:.2s;}
    .btn-mark-all:hover{background:rgba(255,255,255,.5);}
    .notif-item{background:rgba(255,255,255,.97);border-radius:16px;padding:16px 18px;margin-bottom:12px;box-shadow:0 4px 16px rgba(255,105,180,.12);border-left:4px solid #ff6a88;animation:slideIn .3s ease;}
    .notif-item.unread{border-left-color:#e84393;background:#fff5f9;}
    .notif-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:6px;}
    .notif-title{font-weight:700;color:#333;font-size:14px;}
    .notif-time{font-size:11px;color:#bbb;white-space:nowrap;margin-left:10px;}
    .notif-event{font-size:12px;color:#ff6a88;font-weight:700;margin-bottom:6px;}
    .notif-body{font-size:13px;color:#555;line-height:1.5;}
    .notif-footer{display:flex;justify-content:space-between;align-items:center;margin-top:10px;}
    .email-badge{font-size:11px;background:#d4f7e7;color:#27ae60;padding:2px 8px;border-radius:6px;font-weight:700;}
    .unread-dot{width:8px;height:8px;background:#e84393;border-radius:50%;display:inline-block;margin-right:6px;}
    .btn-del-notif{background:none;border:none;color:#ddd;cursor:pointer;font-size:16px;padding:2px 6px;border-radius:6px;transition:.2s;}
    .btn-del-notif:hover{color:#ff4757;background:#fff0f0;}
    .empty-state{text-align:center;padding:50px 20px;background:rgba(255,255,255,.97);border-radius:20px;}
    .empty-state .icon{font-size:52px;margin-bottom:12px;} .empty-state p{color:#bbb;font-weight:600;}
    .send-progress{display:none;margin-top:10px;background:#fff0f5;border-radius:12px;padding:12px 16px;}
    .send-progress.show{display:block;}
    .progress-bar-bg{background:#ffe0ea;border-radius:999px;height:8px;margin:8px 0;overflow:hidden;}
    .progress-bar-fill{height:100%;background:linear-gradient(90deg,#ff6a88,#e84393);border-radius:999px;transition:width .3s ease;}
    .progress-text{font-size:12px;color:#c0395e;font-weight:700;}
    .toast{position:fixed;bottom:25px;left:50%;transform:translateX(-50%) translateY(100px);padding:12px 25px;border-radius:12px;color:#fff;font-weight:700;transition:.4s;z-index:10001;opacity:0;text-align:center;max-width:90vw;}
    .toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
    .toast.success{background:#2ecc71;} .toast.error{background:#e74c3c;} .toast.info{background:#3498db;}
    .flower{position:fixed;top:-50px;font-size:20px;animation:fall linear infinite;pointer-events:none;z-index:0;}
    @keyframes fall{0%{transform:translateY(-50px) rotate(0)}100%{transform:translateY(110vh) rotate(360deg)}}
    #loadingOverlay{position:fixed;inset:0;background:rgba(255,154,158,.8);display:flex;align-items:center;justify-content:center;z-index:9999;font-size:18px;font-weight:700;color:#fff;font-family:'Quicksand';}
    #loadingOverlay.hidden{display:none;}
  </style>
</head>
<body>

<div id="loadingOverlay">⏳ Đang kết nối Firebase...</div>

<div class="header">
  <button class="back-btn" onclick="history.back()">←</button>
  <div class="header-title">🔔 Thông báo sự kiện</div>
  <div class="tabs">
    <button class="tab-btn active" onclick="switchTab('send',this)">📢 Gửi</button>
    <button class="tab-btn" onclick="switchTab('inbox',this)">📬 Trung tâm</button>
  </div>
</div>

<div class="content">
  <!-- GỬI THÔNG BÁO -->
  <div id="section-send" class="section active">
    <div class="card">
      <h3>📢 Gửi thông báo đến người tham gia</h3>
      <div class="form-group">
        <label>Chọn sự kiện</label>
        <select id="selectEvent" onchange="updateRecipientCount()">
          <option value="">-- Tất cả sự kiện --</option>
        </select>
      </div>
      <div class="recipient-info" id="recipientInfo">
        👥 Sẽ gửi đến: <b id="recipientCount">0</b> người đăng ký
      </div>
      <div class="form-group">
        <label>Tiêu đề thông báo ⭐</label>
        <input type="text" id="notifTitle" placeholder="VD: Thay đổi địa điểm tổ chức">
      </div>
      <div class="form-group">
        <label>Nội dung thông báo</label>
        <textarea id="notifMessage" placeholder="Nhập nội dung..."></textarea>
      </div>
      <label class="toggle-email">
        <input type="checkbox" id="sendEmail" checked>
        <div>
          <span>📧 Gửi kèm Email</span>
          <span class="sub">Gửi email thật đến từng người đăng ký</span>
        </div>
      </label>
      <button class="btn-send" id="btnSend" onclick="sendNotification()">🚀 Gửi thông báo</button>
      <div class="send-progress" id="sendProgress">
        <div class="progress-text" id="progressText">Đang gửi...</div>
        <div class="progress-bar-bg"><div class="progress-bar-fill" id="progressFill" style="width:0%"></div></div>
      </div>
    </div>
  </div>

  <!-- TRUNG TÂM THÔNG BÁO -->
  <div id="section-inbox" class="section">
    <div class="top-actions">
      <div class="section-label">📬 Thông báo của bạn</div>
      <button class="btn-mark-all" onclick="markAllRead()">✅ Đánh dấu đã đọc</button>
    </div>
    <div id="notifList"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<!-- EmailJS -->
<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>

<script type="module">
import { FS } from "./firebase-sync.js";

const EMAILJS_SERVICE_ID  = 'service_lzo2lnw';
const EMAILJS_TEMPLATE_ID = 'template_sp70x7i';
const EMAILJS_PUBLIC_KEY  = 'sG_TiXIGwxdu_0RRx';
emailjs.init(EMAILJS_PUBLIC_KEY);

// Hoa rơi
setInterval(() => {
  const f = document.createElement('div');
  f.className='flower'; f.innerHTML='🌸';
  f.style.left = Math.random()*100+'vw';
  f.style.animationDuration = (3+Math.random()*5)+'s';
  document.body.appendChild(f);
  setTimeout(()=>f.remove(), 8000);
}, 400);

// Chờ Firebase
await FS.ready;
document.getElementById('loadingOverlay').classList.add('hidden');

// Điền dropdown
function populateEventDropdown() {
  const sel = document.getElementById('selectEvent');
  const cur = sel.value;
  sel.innerHTML = '<option value="">-- Tất cả sự kiện --</option>';
  FS.getEvents().forEach(e => {
    const opt = document.createElement('option');
    opt.value = e.t || e.id;
    opt.textContent = e.t || e.id;
    if (opt.value === cur) opt.selected = true;
    sel.appendChild(opt);
  });
  updateRecipientCount();
}

window.addEventListener('fs:events', populateEventDropdown);
window.addEventListener('fs:notifications', () => {
  if (document.getElementById('section-inbox').classList.contains('active')) renderInbox();
});

populateEventDropdown();

window.updateRecipientCount = () => {
  const eventName = document.getElementById('selectEvent').value;
  const targets = eventName
    ? FS.getParticipants().filter(p => p.event === eventName)
    : FS.getParticipants();
  document.getElementById('recipientCount').textContent = targets.length;
};

window.switchTab = (tab, btn) => {
  document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('section-'+tab).classList.add('active');
  btn.classList.add('active');
  if (tab === 'inbox') renderInbox();
};

window.sendNotification = async () => {
  const eventName = document.getElementById('selectEvent').value;
  const title     = document.getElementById('notifTitle').value.trim();
  const message   = document.getElementById('notifMessage').value.trim();
  const doEmail   = document.getElementById('sendEmail').checked;
  const cu        = FS.getCurrentUser();

  if (!title)   return showToast('❌ Vui lòng nhập tiêu đề!', 'error');
  if (!message) return showToast('❌ Vui lòng nhập nội dung!', 'error');

  const targets = eventName
    ? FS.getParticipants().filter(p => p.event === eventName)
    : FS.getParticipants();
  if (!targets.length) return showToast('❌ Không có người đăng ký nào!', 'error');

  // Lưu vào Firebase
  const notif = {
    title, message,
    event: eventName || 'Tất cả sự kiện',
    time: new Date().toISOString(),
    sentBy: cu?.name || 'Ban tổ chức',
    emailSent: doEmail,
    read: false
  };
  await FS.addNotification(notif);

  if (doEmail) {
    const btn = document.getElementById('btnSend');
    btn.disabled = true; btn.textContent = '⏳ Đang gửi...';
    const progress = document.getElementById('sendProgress');
    progress.classList.add('show');
    let sent=0, failed=0;
    for (let i=0; i<targets.length; i++) {
      const p = targets[i];
      document.getElementById('progressText').textContent = `Đang gửi... ${i}/${targets.length}`;
      document.getElementById('progressFill').style.width = Math.round(i/targets.length*100)+'%';
      if (p.email) {
        try {
          await emailjs.send(EMAILJS_SERVICE_ID, EMAILJS_TEMPLATE_ID, {
            to_email: p.email, subject: title, message,
            from_name: cu?.name || 'Ban tổ chức AGL'
          });
          sent++;
        } catch { failed++; }
      } else { failed++; }
      await new Promise(r => setTimeout(r, 300));
    }
    document.getElementById('progressFill').style.width = '100%';
    document.getElementById('progressText').textContent = `✅ Hoàn tất! Đã gửi: ${sent} | Lỗi: ${failed}`;
    btn.disabled = false; btn.textContent = '🚀 Gửi thông báo';
    showToast(`🎉 Gửi xong! ${sent}/${targets.length} email thành công`);
  } else {
    showToast('🔔 Đã lưu thông báo vào Trung tâm!');
  }

  document.getElementById('notifTitle').value = '';
  document.getElementById('notifMessage').value = '';
};

function renderInbox() {
  const notifs = FS.getNotifications().slice().reverse(); // mới nhất lên đầu — đã sort bởi Firebase key
  const container = document.getElementById('notifList');
  if (!notifs.length) {
    container.innerHTML = `<div class="empty-state"><div class="icon">📭</div><p>Chưa có thông báo nào</p></div>`;
    return;
  }
  container.innerHTML = notifs.map(n => `
    <div class="notif-item ${n.read?'':'unread'}">
      <div class="notif-header">
        <div class="notif-title">${n.read?'':`<span class="unread-dot"></span>`}${n.title}</div>
        <div class="notif-time">${formatTime(n.time)}</div>
      </div>
      <div class="notif-event">📌 ${n.event}</div>
      <div class="notif-body">${n.message}</div>
      <div class="notif-footer">
        <div>
          ${n.emailSent?`<span class="email-badge">📧 Đã gửi email</span>`:''}
          <span style="font-size:11px;color:#bbb;margin-left:6px;">Bởi: ${n.sentBy||'Ban tổ chức'}</span>
        </div>
        <div style="display:flex;gap:6px;">
          ${!n.read?`<button class="btn-del-notif" onclick="markRead('${n.id}')" title="Đã đọc">✓</button>`:''}
          <button class="btn-del-notif" onclick="deleteNotif('${n.id}')" title="Xóa">🗑️</button>
        </div>
      </div>
    </div>
  `).join('');
}

window.markRead = async (id) => {
  await FS.update(FS.ref(FS.db, `notifications/${id}`), { read: true });
};
window.markAllRead = async () => {
  const promises = FS.getNotifications().filter(n=>!n.read).map(n =>
    FS.update(FS.ref(FS.db, `notifications/${n.id}`), { read: true })
  );
  await Promise.all(promises);
  showToast('✅ Đã đánh dấu tất cả đã đọc!');
};
window.deleteNotif = async (id) => {
  await FS.deleteNotification(id);
};

function formatTime(iso) {
  if (!iso) return '';
  return new Date(iso).toLocaleString('vi-VN', { day:'2-digit',month:'2-digit',year:'numeric',hour:'2-digit',minute:'2-digit' });
}

function showToast(msg, type='success') {
  const t = document.getElementById('toast');
  t.textContent = msg; t.className = `toast ${type} show`;
  setTimeout(()=>t.classList.remove('show'), 3500);
}
</script>
</body>
</html>
