<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quản lý sự kiện CLB</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="menu-toggle" onclick="toggleMenu()">☰</div>

<div class="menu" id="menu">
  <button onclick="go('home')">🏠 Trang chủ</button>
  <button onclick="go('create')" class="adminOnly">➕ Tạo sự kiện</button>
  <button onclick="go('manage')" class="adminOnly">📋 Quản lý sự kiện</button>
  <button onclick="go('participants')" class="adminOnly">📑 Người tham gia</button>
  <button onclick="go('join')">🙋 Tham gia</button>
  <button onclick="go('login')">🔐 Đăng nhập / Đăng ký</button>
  <button onclick="logout()">🚪 Đăng xuất</button>
</div>

<!-- HOME -->
<div id="home" class="page" style="display: block;">
  <div class="card">
    <h2>🌸 Quản lý sự kiện CLB 🌸</h2>
    <p id="welcome">Chào mừng bạn!</p>
  </div>
</div>

<!-- CREATE -->
<div id="create" class="page">
  <div class="card">
    <h2>➕ Tạo sự kiện mới</h2>

    <div class="form-group">
      <label>Tên sự kiện *</label>
      <input id="title" type="text" maxlength="100">
      <div class="char-counter" id="titleCount">0 / 100</div>
      <div class="err-msg" id="titleErr">Vui lòng nhập!</div>
    </div>

    <div class="form-group">
      <label>Người phụ trách *</label>
      <input id="leader" type="text">
      <div class="err-msg" id="leaderErr">Vui lòng nhập!</div>
    </div>

    <div class="form-row">
      <div class="form-group">
        <label>Ngày *</label>
        <input id="date" type="date">
        <div class="err-msg" id="dateErr">Chọn ngày!</div>
      </div>
      <div class="form-group">
        <label>Giờ</label>
        <input id="time" type="time" value="08:00">
      </div>
    </div>

    <div class="form-group">
      <label>Trạng thái</label>
      <div class="status-options">
        <div class="status-tag active" data-val="Mở" onclick="selectStatus(this)">🟢 Mở</div>
        <div class="status-tag" data-val="Sắp mở" onclick="selectStatus(this)">🟡</div>
        <div class="status-tag" data-val="Đóng" onclick="selectStatus(this)">🔴</div>
      </div>
    </div>

    <button class="main" onclick="submitEvent()">Tạo sự kiện</button>
  </div>
</div>

<!-- MANAGE -->
<div id="manage" class="page">
  <div class="card">
    <h2>📋 Danh sách</h2>
    <table>
      <tbody id="eventTable"></tbody>
    </table>
  </div>
</div>

<!-- JOIN -->
<div id="join" class="page">
  <div class="card">
    <h2>🙋 Tham gia</h2>
    <input id="pname" placeholder="Tên">
    <select id="peventSelect"></select>
    <button class="main" onclick="addParticipant()">Đăng ký</button>
  </div>
</div>

<!-- LOGIN -->
<div id="login" class="page">
  <div class="card">
    <h2 id="authTitle">🔐 Đăng nhập</h2>
    <input id="auth_email" placeholder="Email">
    <input id="auth_pass" type="password" placeholder="Mật khẩu">
    <div id="regFields" style="display:none;">
      <input id="auth_name" placeholder="Tên">
      <select id="auth_role">
        <option value="user">User</option>
        <option value="admin">Admin</option>
      </select>
    </div>
    <button class="main" onclick="handleAuth()">OK</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="script.js"></script>
</body>
</html>
