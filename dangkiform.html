<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Quản lý sự kiện CLB</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #ff9a9e, #fecfef);
}

.flower {
    position: fixed;
    top: -50px;
    font-size: 20px;
    animation: fall linear infinite;
}
@keyframes fall {
    to { transform: translateY(110vh); }
}

.container {
    display: flex;
    justify-content: space-around;
    padding: 40px;
}

.form-box {
    width: 350px;
    background: rgba(255,255,255,0.9);
    padding: 20px;
    border-radius: 15px;
    box-shadow: 0 10px 25px rgba(255,105,180,0.4);
}

h2 {
    text-align: center;
    color: #ff4d88;
}

input, select, button {
    width: 100%;
    box-sizing: border-box;
    padding: 10px;
    margin: 8px 0;
    border-radius: 8px;
    border: 1px solid #ffb6c1;
}

button {
    background: #ff4d88;
    color: white;
    cursor: pointer;
    border: none;
}

button:hover {
    background: #e6005c;
}

.table-box {
    width: 500px;
    background: rgba(255,255,255,0.9);
    padding: 20px;
    border-radius: 15px;
}

table {
    width: 100%;
    border-collapse: collapse;
}

th, td {
    border-bottom: 1px solid #ddd;
    padding: 8px;
    text-align: center;
}

th {
    background: #ffb6c1;
}

#thongbao {
    text-align: center;
    font-weight: bold;
    margin-top: 10px;
}
</style>
</head>

<body>

<script>
for (let i = 0; i < 30; i++) {
    let f = document.createElement("div");
    f.className = "flower";
    f.innerHTML = "🌸";
    f.style.left = Math.random()*100 + "vw";
    f.style.animationDuration = (5 + Math.random()*5) + "s";
    document.body.appendChild(f);
}
</script>

<div class="container">

<div class="form-box">
    <h2>🌸 Đăng ký sự kiện</h2>

    <input type="text" id="hoten" placeholder="Họ tên">
    <input type="text" id="mssv" placeholder="MSSV">
    <input type="email" id="email" placeholder="Email">

    <select id="khoa">
        <option value="">--Chọn khóa--</option>
        <option>K48</option>
        <option>K49</option>
        <option>K50</option>
        <option>K51</option>
    </select>

    <button onclick="dangKy()">💖 Đăng ký</button>

    <p id="thongbao"></p>
</div>

<div class="table-box">
    <h2>📋 Danh sách đăng ký</h2>

    <table>
        <thead>
            <tr>
                <th>Họ tên</th>
                <th>MSSV</th>
                <th>Email</th>
                <th>Khóa</th>
                <th>Xóa</th>
            </tr>
        </thead>
        <tbody id="ds"></tbody>
    </table>
</div>

</div>

<script>
let danhSach = JSON.parse(localStorage.getItem("dsSV")) || [];

function hienThi() {
    let html = "";
    danhSach.forEach((sv, index) => {
        html += `
        <tr>
            <td>${sv.hoten}</td>
            <td>${sv.mssv}</td>
            <td>${sv.email}</td>
            <td>${sv.khoa}</td>
<td><button onclick="xoa(${index})">❌</button></td>
        </tr>`;
    });
    document.getElementById("ds").innerHTML = html;
}

function xoa(index) {
    danhSach.splice(index, 1);
    localStorage.setItem("dsSV", JSON.stringify(danhSach));
    hienThi();
}

function dangKy() {
    let hoten = document.getElementById("hoten").value.trim();
    let mssv = document.getElementById("mssv").value.trim();
    let email = document.getElementById("email").value.trim();
    let khoa = document.getElementById("khoa").value;
    let thongbao = document.getElementById("thongbao");

    thongbao.innerText = "";

    if (!hoten || !mssv || !email || !khoa) {
        thongbao.style.color = "red";
        thongbao.innerText = "❌ Vui lòng nhập đầy đủ thông tin!";
        return;
    }

    // ✅ bắt buộc gmail
    if (!email.endsWith("@gmail.com")) {
        thongbao.style.color = "red";
        thongbao.innerText = "❌ Email không hợp lệ!";
        return;
    }

    if (danhSach.some(sv => sv.mssv === mssv)) {
        thongbao.style.color = "red";
        thongbao.innerText = "❌ MSSV đã tồn tại!";
        return;
    }

    if (danhSach.some(sv => sv.email === email)) {
        thongbao.style.color = "red";
        thongbao.innerText = "❌ Email đã tồn tại!";
        return;
    }

    let sv = { hoten, mssv, email, khoa };
    danhSach.push(sv);

    localStorage.setItem("dsSV", JSON.stringify(danhSach));

    hienThi();

    thongbao.style.color = "green";
    thongbao.innerText = "🎉 Đăng ký thành công!";

    document.getElementById("hoten").value = "";
    document.getElementById("mssv").value = "";
    document.getElementById("email").value = "";
    document.getElementById("khoa").value = "";
}

hienThi();
</script>

</body>
</html>
