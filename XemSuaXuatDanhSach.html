<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quản Lý Chi Tiết Thành Viên - CLB</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Quicksand:wght@400;500;600;700&family=Nunito:wght@400;600;700&display=swap');
    *{margin:0;padding:0;box-sizing:border-box;font-family:'Nunito',sans-serif;}
    body{background:linear-gradient(135deg,#ff9a9e,#fad0c4);min-height:100vh;padding:40px 20px;}
    .card{background:rgba(255,255,255,.97);padding:30px;border-radius:24px;max-width:1100px;margin:0 auto;box-shadow:0 16px 48px rgba(255,105,180,.2);}
    h2{text-align:center;color:#e84393;margin-bottom:25px;font-family:'Quicksand';font-weight:700;}
    .edit-panel{background:#fff9fb;padding:20px;border-radius:18px;border:2px solid #ffe0ea;margin-bottom:25px;display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:15px;}
    .form-group{display:flex;flex-direction:column;gap:5px;}
    .form-group label{font-size:12px;font-weight:700;color:#c0395e;margin-left:5px;}
    input,select{width:100%;padding:12px;border:2px solid #ffe0ea;border-radius:12px;outline:none;background:#fff;transition:.3s;font-family:'Nunito';}
    input:focus{border-color:#ff6a88;box-shadow:0 0 8px rgba(255,106,136,.2);}
    .btn-group{display:flex;gap:10px;margin-bottom:20px;align-items:center;}
    button.main{padding:12px 25px;background:linear-gradient(135deg,#ff6a88,#e84393);color:#fff;border:none;border-radius:12px;font-weight:700;cursor:pointer;transition:.3s;font-family:'Nunito';}
    button.main:hover{transform:translateY(-2px);box-shadow:0 5px 15px rgba(255,106,136,.4);}
    .btn-edit{background:#3498db;color:#fff;border:none;padding:7px 14px;border-radius:8px;cursor:pointer;margin-right:4px;}
    .btn-del{background:#ff4757;color:#fff;border:none;padding:7px 14px;border-radius:8px;cursor:pointer;}
    .btn-checkin{background:#2ecc71;color:#fff;border:none;padding:7px 14px;border-radius:8px;cursor:pointer;margin-right:4px;}
    .table-container{overflow-x:auto;border-radius:15px;border:1px solid #ffe0ea;background:#fff;}
    table{width:100%;border-collapse:collapse;min-width:850px;}
    th,td{padding:15px;text-align:center;border-bottom:1px solid #fef0f5;}
    th{background:#ffe0ea;color:#c0395e;font-weight:700;position:sticky;top:0;}
    tr:hover{background-color:#fffafb;}
    .status-badge{padding:5px 12px;border-radius:20px;font-size:13px;font-weight:700;}
    .checkin-true{background:#eafaf1;color:#27ae60;} .checkin-false{background:#fef5e7;color:#e67e22;}
    .back-btn{text-decoration:none;color:#ff6a88;font-weight:700;display:inline-block;margin-bottom:15px;}
    .toast{position:fixed;bottom:25px;left:50%;transform:translateX(-50%) translateY(100px);padding:12px 25px;border-radius:12px;color:#fff;font-weight:700;transition:.4s;z-index:10001;opacity:0;}
    .toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
    .toast.success{background:#2ecc71;} .toast.error{background:#e74c3c;} .toast.info{background:#3498db;}
    .flower{position:fixed;top:-50px;font-size:20px;animation:fall linear infinite;pointer-events:none;z-index:0;}
    @keyframes fall{0%{transform:translateY(-50px) rotate(0)}100%{transform:translateY(110vh) rotate(360deg)}}
    #loadingOverlay{position:fixed;inset:0;background:rgba(255,154,158,.8);display:flex;align-items:center;justify-content:center;z-index:9999;font-size:18px;font-weight:700;color:#fff;font-family:'Quicksand';}
    #loadingOverlay.hidden{display:none;}
    .live-badge{display:inline-block;background:#2ecc71;color:#fff;font-size:10px;font-weight:700;padding:2px 8px;border-radius:10px;margin-left:8px;}
  </style>
</head>
<body>

<div id="loadingOverlay">⏳ Đang kết nối Firebase...</div>

<div class="card">
  <a href="Giaodienquanlysukienclb.html" class="back-btn">← Quay lại trang chủ</a>
  <h2>🔍 Quản Lý Chi Tiết & Điểm Danh <span class="live-badge">LIVE</span></h2>

  <div class="edit-panel" id="editPanel">
    <div class="form-group"><label>Họ và Tên</label><input type="text" id="inp_name" placeholder="Nhập tên..."></div>
    <div class="form-group"><label>MSSV</label><input type="text" id="inp_mssv" placeholder="Nhập MSSV..."></div>
    <div class="form-group"><label>Sự kiện</label><input type="text" id="inp_event" placeholder="Tên sự kiện..."></div>
    <div class="form-group">
      <label>Trạng thái check-in</label>
      <select id="inp_status">
        <option value="false">⏳ Chưa Check-in</option>
        <option value="true">✅ Đã Check-in</option>
      </select>
    </div>
    <div style="display:flex;align-items:flex-end;">
      <button class="main" style="width:100%;" onclick="updateMember()">Lưu Thay Đổi</button>
    </div>
  </div>

  <div class="btn-group">
    <input type="text" id="searchBox" placeholder="Tìm tên, MSSV hoặc sự kiện..." oninput="renderTable()" style="flex:2;padding:10px 14px;border:2px solid #ffe0ea;border-radius:12px;outline:none;">
    <select id="filterCheckin" onchange="renderTable()" style="padding:10px;border:2px solid #ffe0ea;border-radius:12px;outline:none;">
      <option value="">-- Tất cả trạng thái --</option>
      <option value="true">✅ Đã Check-in</option>
      <option value="false">⏳ Chưa Check-in</option>
    </select>
    <button class="main" style="background:#8e44ad;white-space:nowrap;" onclick="exportCSV()">📥 Xuất CSV</button>
  </div>

  <div class="table-container">
    <table>
      <thead>
        <tr>
          <th>STT</th><th>Họ Tên</th><th>MSSV</th><th>Email</th>
          <th>Sự kiện</th><th>Trạng Thái</th><th>Hành động</th>
        </tr>
      </thead>
      <tbody id="mainTableBody"></tbody>
    </table>
  </div>
</div>

<div class="toast" id="toast"></div>

<script type="module">
import { FS } from "./firebase-sync.js";

let editingId = null;

// Hoa rơi
setInterval(()=>{
  const f=document.createElement('div');f.className='flower';f.innerHTML='🌸';
  f.style.left=Math.random()*100+'vw';f.style.animationDuration=(3+Math.random()*5)+'s';
  document.body.appendChild(f);setTimeout(()=>f.remove(),8000);
},400);

// Chờ Firebase
await FS.ready;
document.getElementById('loadingOverlay').classList.add('hidden');

// Real-time
window.addEventListener('fs:participants', () => renderTable());
renderTable();

function renderTable() {
  const tbody = document.getElementById('mainTableBody');
  const kw    = (document.getElementById('searchBox')?.value||'').toLowerCase();
  const ckFilter = document.getElementById('filterCheckin')?.value;

  let list = FS.getParticipants().filter(p => {
    const matchKw =
      (p.name||'').toLowerCase().includes(kw) ||
      (p.mssv||'').toLowerCase().includes(kw) ||
      (p.event||'').toLowerCase().includes(kw);
    const matchCk = ckFilter==='' ? true : String(p.checkedIn) === ckFilter;
    return matchKw && matchCk;
  });

  if (!list.length) {
    tbody.innerHTML=`<tr><td colspan="7" style="text-align:center;color:#aaa;padding:30px;">Không có dữ liệu</td></tr>`;
    return;
  }

  tbody.innerHTML = list.map((p,i) => {
    const statusClass = p.checkedIn ? 'checkin-true' : 'checkin-false';
    const statusText  = p.checkedIn ? '✅ Đã Check-in' : '⏳ Chưa Check-in';
    return `
      <tr>
        <td>${i+1}</td>
        <td style="font-weight:600;color:#2c3e50;">${p.name||'—'}</td>
        <td><code>${p.mssv||'—'}</code></td>
        <td style="font-size:12px;">${p.email||'—'}</td>
        <td>${p.event||'—'}</td>
        <td><span class="status-badge ${statusClass}">${statusText}</span></td>
        <td>
          ${!p.checkedIn?`<button class="btn-checkin" onclick="quickCheckin('${p.id}')">✅ Check-in</button>`:''}
          <button class="btn-edit" onclick="loadToForm('${p.id}')">✏️ Sửa</button>
          <button class="btn-del"  onclick="deleteItem('${p.id}')">🗑️</button>
        </td>
      </tr>`;
  }).join('');
}
window.renderTable = renderTable;

window.quickCheckin = async (id) => {
  await FS.updateParticipant(id, { checkedIn: true });
  showToast('✅ Check-in thành công!');
};

window.loadToForm = (id) => {
  editingId = id;
  const p = FS.getParticipants().find(x => x.id === id);
  if (!p) return;
  document.getElementById('inp_name').value  = p.name  || '';
  document.getElementById('inp_mssv').value  = p.mssv  || '';
  document.getElementById('inp_event').value = p.event || '';
  document.getElementById('inp_status').value = String(p.checkedIn||false);
  document.getElementById('editPanel').style.boxShadow = '0 0 20px rgba(232,67,147,.3)';
  window.scrollTo({top:0,behavior:'smooth'});
};

window.updateMember = async () => {
  if (!editingId) { showToast('Chọn một thành viên trong danh sách để sửa!', 'error'); return; }
  const data = {
    name:      document.getElementById('inp_name').value.trim(),
    mssv:      document.getElementById('inp_mssv').value.trim(),
    event:     document.getElementById('inp_event').value.trim(),
    checkedIn: document.getElementById('inp_status').value === 'true'
  };
  await FS.updateParticipant(editingId, data);
  showToast('✅ Đã cập nhật thành công!');
  editingId = null;
  document.getElementById('editPanel').style.boxShadow = 'none';
};

window.deleteItem = async (id) => {
  if (!confirm('Xóa thành viên này?')) return;
  await FS.deleteParticipant(id);
  showToast('🗑️ Đã xóa!', 'error');
};

window.exportCSV = () => {
  const list = FS.getParticipants();
  if (!list.length) return showToast('Không có dữ liệu!', 'error');
  let csv = '\uFEFFSTT,Họ Tên,MSSV,Email,Sự kiện,Trạng Thái\n';
  list.forEach((p,i) => {
    csv += `${i+1},"${p.name||''}","${p.mssv||''}","${p.email||''}","${p.event||''}","${p.checkedIn?'Đã Check-in':'Chưa Check-in'}"\n`;
  });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([csv],{type:'text/csv;charset=utf-8;'}));
  a.download = 'danh_sach_chi_tiet.csv';
  a.click();
  showToast('📥 Xuất CSV thành công!');
};

function showToast(msg,type='success'){
  const t=document.getElementById('toast');
  t.textContent=msg;t.className=`toast ${type} show`;
  setTimeout(()=>t.classList.remove('show'),3000);
}
</script>
</body>
</html>
