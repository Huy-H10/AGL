<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản Lý Chi Tiết Thành Viên - CLB</title>
    <style>
        /* Tích hợp trực tiếp style từ giaodien.css của bạn */
        @import url('https://fonts.googleapis.com/css2?family=Quicksand:wght@400;500;600;700&family=Nunito:wght@400;600;700&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Nunito', sans-serif; }
        body { 
            background: linear-gradient(135deg, #ff9a9e, #fad0c4); 
            min-height: 100vh; 
            padding: 40px 20px;
        }

        .card {
            background: rgba(255, 255, 255, .97);
            padding: 30px;
            border-radius: 24px;
            max-width: 1100px;
            margin: 0 auto;
            box-shadow: 0 16px 48px rgba(255, 105, 180, .2);
        }

        h2 { 
            text-align: center; 
            color: #e84393; 
            margin-bottom: 25px; 
            font-family: 'Quicksand'; 
            font-weight: 700;
        }

        /* Form Chỉnh Sửa */
        .edit-panel {
            background: #fff9fb;
            padding: 20px;
            border-radius: 18px;
            border: 2px solid #ffe0ea;
            margin-bottom: 25px;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
        }

        .form-group { display: flex; flex-direction: column; gap: 5px; }
        .form-group label { font-size: 12px; font-weight: 700; color: #c0395e; margin-left: 5px; }

        input, select {
            width: 100%;
            padding: 12px;
            border: 2px solid #ffe0ea;
            border-radius: 12px;
            outline: none;
            background: #fff;
            transition: 0.3s;
        }

        input:focus { border-color: #ff6a88; box-shadow: 0 0 8px rgba(255, 106, 136, 0.2); }

        /* Nút bấm */
        .btn-group { display: flex; gap: 10px; margin-bottom: 20px; align-items: center; }
        
        button.main {
            padding: 12px 25px;
            background: linear-gradient(135deg, #ff6a88, #e84393);
            color: #fff;
            border: none;
            border-radius: 12px;
            font-weight: 700;
            cursor: pointer;
            transition: 0.3s;
        }

        button.main:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(255, 106, 136, 0.4); }
        
        .btn-edit { background: #3498db; color: white; border: none; padding: 7px 14px; border-radius: 8px; cursor: pointer; }
        .btn-del { background: #ff4757; color: white; border: none; padding: 7px 14px; border-radius: 8px; cursor: pointer; }

        /* Bảng */
        .table-container { 
            overflow-x: auto; 
            border-radius: 15px; 
            border: 1px solid #ffe0ea;
            background: #fff;
        }
        table { width: 100%; border-collapse: collapse; min-width: 850px; }
        th, td { padding: 15px; text-align: center; border-bottom: 1px solid #fef0f5; }
        th { background: #ffe0ea; color: #c0395e; font-weight: 700; position: sticky; top: 0; }
        
        tr:hover { background-color: #fffafb; }

        .status-badge {
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 700;
        }
        .checkin-true { background: #eafaf1; color: #27ae60; }
        .checkin-false { background: #fef5e7; color: #e67e22; }

        .back-btn { text-decoration: none; color: #ff6a88; font-weight: 700; display: inline-block; margin-bottom: 15px; }
    </style>
</head>
<body>

<div class="card">
    <a href="Giaodienquanlysukienclb.html" class="back-btn">← Quay lại trang chủ</a>
    <h2>🔍 Quản Lý Chi Tiết & Điểm Danh</h2>

    <div class="edit-panel" id="editPanel">
        <div class="form-group">
            <label>Họ và Tên</label>
            <input type="text" id="inp_name" placeholder="Nhập tên...">
        </div>
        <div class="form-group">
            <label>MSSV</label>
            <input type="text" id="inp_mssv" placeholder="Nhập MSSV...">
        </div>
        <div class="form-group">
            <label>Sự kiện</label>
            <input type="text" id="inp_event" placeholder="Tên sự kiện...">
        </div>
        <div class="form-group">
            <label>Trạng thái</label>
            <select id="inp_status">
                <option value="Chưa Check-in">Chưa Check-in</option>
                <option value="Đã Check-in">Đã Check-in</option>
            </select>
        </div>
        <div style="display: flex; align-items: flex-end;">
            <button class="main" style="width: 100%;" onclick="updateMember()">Lưu Thay Đổi</button>
        </div>
    </div>

    <div class="btn-group">
        <input type="text" id="searchBox" placeholder="Tìm tên, MSSV hoặc sự kiện..." oninput="renderTable()" style="flex: 2;">
        <button class="main" style="background: #8e44ad; white-space: nowrap;" onclick="exportCSV()">📥 Xuất CSV</button>
    </div>

    <div class="table-container">
        <table>
            <thead>
                <tr>
                    <th>STT</th>
                    <th>Họ Tên</th>
                    <th>MSSV</th>
                    <th>Sự kiện</th>
                    <th>Trạng Thái</th>
                    <th>Hành động</th>
                </tr>
            </thead>
            <tbody id="mainTableBody"></tbody>
        </table>
    </div>
</div>

<script>
    const STORAGE_KEY = 'participants';
    let participants = JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];
    let editingIdx = -1;

    // Hiển thị bảng dữ liệu
    function renderTable() {
        const tbody = document.getElementById('mainTableBody');
        const key = document.getElementById('searchBox').value.toLowerCase();
        
        const filtered = participants.filter(p => 
            (p.name || p.hoTen || "").toLowerCase().includes(key) || 
            (p.mssv || "").toLowerCase().includes(key) ||
            (p.event || "").toLowerCase().includes(key)
        );

        tbody.innerHTML = filtered.map((p, i) => {
            // Tìm vị trí gốc trong mảng participants
            const originalIdx = participants.findIndex(x => x.mssv === p.mssv && x.event === p.event);
            const statusClass = p.status === 'Đã Check-in' ? 'checkin-true' : 'checkin-false';
            
            return `
                <tr>
                    <td>${i + 1}</td>
                    <td style="font-weight: 600; color: #2c3e50;">${p.name || p.hoTen}</td>
                    <td><code>${p.mssv}</code></td>
                    <td>${p.event}</td>
                    <td><span class="status-badge ${statusClass}">${p.status || 'Chưa Check-in'}</span></td>
                    <td>
                        <button class="btn-edit" onclick="loadToForm(${originalIdx})">Sửa</button>
                        <button class="btn-del" onclick="deleteItem(${originalIdx})">Xóa</button>
                    </td>
                </tr>`;
        }).join('');
    }

    // Đưa dữ liệu lên form (Mở khóa toàn bộ input)
    function loadToForm(idx) {
        editingIdx = idx;
        const p = participants[idx];
        document.getElementById('inp_name').value = p.name || p.hoTen;
        document.getElementById('inp_mssv').value = p.mssv;
        document.getElementById('inp_event').value = p.event;
        document.getElementById('inp_status').value = p.status || 'Chưa Check-in';
        
        // Hiệu ứng cuộn lên đầu để sửa
        window.scrollTo({ top: 0, behavior: 'smooth' });
        document.getElementById('editPanel').style.boxShadow = "0 0 20px rgba(232, 67, 147, 0.3)";
    }

    // Lưu cập nhật vào LocalStorage
    function updateMember() {
        if (editingIdx === -1) {
            alert("Vui lòng chọn 'Sửa' một thành viên trong danh sách bên dưới!");
            return;
        }

        // Ghi đè dữ liệu mới
        participants[editingIdx].name = document.getElementById('inp_name').value.trim();
        participants[editingIdx].hoTen = document.getElementById('inp_name').value.trim(); // Đồng bộ cả 2 cách đặt tên biến
        participants[editingIdx].mssv = document.getElementById('inp_mssv').value.trim();
        participants[editingIdx].event = document.getElementById('inp_event').value.trim();
        participants[editingIdx].status = document.getElementById('inp_status').value;

        // Lưu
        localStorage.setItem(STORAGE_KEY, JSON.stringify(participants));
        
        // Reset
        alert("Đã cập nhật thông tin thành công!");
        editingIdx = -1;
        document.getElementById('editPanel').style.boxShadow = "none";
        renderTable();
    }

    // Xóa
    function deleteItem(idx) {
        if (confirm("Bạn có chắc muốn xóa thành viên này?")) {
            participants.splice(idx, 1);
            localStorage.setItem(STORAGE_KEY, JSON.stringify(participants));
            renderTable();
        }
    }

    // Xuất CSV
    function exportCSV() {
        if (participants.length === 0) return alert("Không có dữ liệu!");
        let csv = "\uFEFFSTT,Họ Tên,MSSV,Sự kiện,Trạng Thái\n";
        participants.forEach((p, i) => {
            csv += `${i+1},"${p.name || p.hoTen}","${p.mssv}","${p.event}","${p.status || 'Chưa Check-in'}"\n`;
        });
        const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
        const link = document.createElement("a");
        link.href = URL.createObjectURL(blob);
        link.download = "danh_sach_chi_tiet.csv";
        link.click();
    }

    window.onload = renderTable;
</script>
</body>
</html>
